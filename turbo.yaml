# Goldsky Turbo pipeline: raw_logs → decoded events → webhook (biribi).
# After deploy: run from contracts `yarn update:subgraph:abis`, then here `DEPLOY_JSON=... yarn sync:pipeline`.
# The ABI literal in _gs_log_decode is refreshed from abis/MergedEvents.json by scripts/sync-pipeline.mjs.
name: biribi-roulette-events
resource_size: s
use_dedicated_ip: false
job: false
sources:
  raw_logs:
    dataset_name: arbitrum_sepolia.raw_logs
    start_at: earliest
    type: dataset
    version: 1.0.0
transforms:
  decoded_events:
    primary_key: id
    sql: |-
      SELECT
        id,
        address,
        _gs_log_decode(
