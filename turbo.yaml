Requested","type":"event"},{"anonymous":false,"inputs":[{"indexed":false,"internalType":"address","name":"authority","type":"address"}],"name":"ForwarderAuthorityUpdated","type":"event"},{"anonymous":false,"inputs":[{"indexed":false,"internalType":"uint256","name":"lane","type":"uint256"},{"indexed":false,"internalType":"uint32","name":"previousCursor","type":"uint32"},{"indexed":false,"internalType":"uint32","name":"newCursor","type":"uint32"}],"name":"LaneCursorAdvanced","type":"event"},{"anonymous":false,"inputs":[{"indexed":false,"internalType":"uint32","name":"newMaxPayoutsPerCall","type":"uint32"}],"name":"MaxPayoutsPerCallUpdated","type":"event"},{"anonymous":false,"inputs":[{"indexed":false,"internalType":"uint32","name":"newScanLimit","type":"uint32"}],"name":"ScanLimitUpdated","type":"event"},{"anonymous":false,"inputs":[{"indexed":false,"internalType":"uint256","name":"lane","type":"uint256"},{"indexed":false,"internalType":"uint256","name":"upkeepId","type":"uint256"},{"indexed":false,"internalType":"address","name":"forwarder","type":"address"},{"indexed":false,"internalType":"uint96","name":"amount","type":"uint96"}],"name":"UpkeepRegistered","type":"event"}]',
          topics,
          data
        ) as decoded,
        block_number,
        block_timestamp,
        transaction_hash,
        log_index,
        _gs_op
      FROM raw_logs
      WHERE address IN (
        '0x6499456948fa1409a753b8ef40dc18dccd563d01',
        '0x0ba41d10c05e970ceeeef4f1d7f2fe2f45c1f888',
        '0x3861523245933a342debab87daa8298f3640c57c',
        '0x48e85e0f774f0d0d44519b13a959d9faa78e831b',
        '0x924b24ca118fa0fbe1ace279d9af2821952015d3'
      )
    type: sql
  roulette_events:
    primary_key: id
    sql: |-
      SELECT
        id,
        address,
        decoded.event_signature AS `event_signature`,
        decoded.event_params[1] AS param1,
        decoded.event_params[2] AS param2,
        decoded.event_params[3] AS param3,
        decoded.event_params[4] AS param4,
        decoded.event_params[5] AS param5,
        decoded.event_params[6] AS param6,
        block_number,
        block_timestamp,
        transaction_hash,
        log_index,
        _gs_op
      FROM decoded_events
      WHERE decoded IS NOT NULL
    type: sql
sinks:
  webhook_events:
    from: roulette_events
    headers: null
    one_row_per_request: false
    payload_version: null
    type: webhook
    url: >-
      https://biribi.net/api/mirror?secret=${WEBHOOK_SECRET}
