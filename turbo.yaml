# Goldsky Turbo pipeline: raw_logs -> decoded events -> webhook (biribi).
# Addresses and ABI are injected by scripts/sync-pipeline.mjs (do not edit manually).
#   DEPLOY_JSON=./deployments/arbitrum-sepolia.json yarn sync:pipeline
name: biribi-roulette-events
resource_size: s
use_dedicated_ip: false
job: false
sources:
  raw_logs:
    dataset_name: arbitrum_sepolia.raw_logs
    start_at: earliest
    type: dataset
    version: 1.0.0
transforms:
  decoded_events:
    primary_key: id
    sql: |-
      SELECT
        id,
        address,
        _gs_log_decode(
          '__SYNC_PIPELINE_ABI__',
          topics,
          data
        ) as decoded,
        block_number,
        block_timestamp,
        transaction_hash,
        log_index,
        _gs_op
      FROM raw_logs
      WHERE address IN (
        __SYNC_PIPELINE_ADDRESSES__
      )
    type: sql
  roulette_events:
    primary_key: id
    sql: |-
      SELECT
        id,
        address,
        decoded.event_signature AS `event_signature`,
        decoded.event_params[1] AS param1,
        decoded.event_params[2] AS param2,
        decoded.event_params[3] AS param3,
        decoded.event_params[4] AS param4,
        decoded.event_params[5] AS param5,
        decoded.event_params[6] AS param6,
        block_number,
        block_timestamp,
        transaction_hash,
        log_index,
        _gs_op
      FROM decoded_events
      WHERE decoded IS NOT NULL
    type: sql
sinks:
  webhook_events:
    from: roulette_events
    headers: null
    one_row_per_request: false
    payload_version: null
    type: webhook
    url: >-
      https://biribi.net/api/mirror?secret=${WEBHOOK_SECRET}
