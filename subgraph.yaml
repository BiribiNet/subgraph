specVersion: 1.3.0
description: BRB multi-market
schema:
  file: ./schema.graphql
indexerHints:
  prune: auto
dataSources:
  - name: BRBToken
    kind: ethereum/contract
    network: arbitrum-sepolia
    source:
      abi: BRB
      address: "0x0a06e95fb780ba06365c8a082e9be10a97d6f9bf"
      startBlock: 273225571
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - GlobalState
        - GlobalRound
        - Market
        - BRBTransfer
        - BRBBurn
        - User
        - WithdrawTransaction
        - JackpotPayout
        - PayoutTransaction
        - RouletteRound
        - RouletteBet
        - DailyStat
        - TokenApproval
        - ProtocolStats
      abis:
        - name: BRB
          file: ./abis/BRB.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
        - event: Approval(indexed address,indexed address,uint256)
          handler: handleApproval
      file: ./src/mappings/brb.ts
  - name: RouletteEngine
    kind: ethereum/contract
    network: arbitrum-sepolia
    source:
      abi: Game
      address: "0x2f6bbd7df2e997788a6a3759edcd7282028d40bd"
      startBlock: 273225571
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - GlobalState
        - GlobalRound
        - Market
        - BankAddress
        - RouletteRound
        - RouletteBet
        - PayoutTransaction
        - User
        - AdminRoleChange
        - ContractUpgrade
        - ProtocolStats
        - DailyStat
      abis:
        - name: Game
          file: ./abis/Game.json
        - name: BankVault4626
          file: ./abis/BankVault4626.json
        - name: ERC20
          file: ./abis/ERC20.json
      eventHandlers:
        - event: BetRecorded(uint32,uint64,address,uint256,bytes)
          handler: handleBetRecorded
        - event: RoundCountdownStarted(uint64,uint32,uint256)
          handler: handleRoundCountdownStarted
        - event: RoundLocked(uint32,uint64,uint64)
          handler: handleRoundLocked
        - event: VrfRequested(uint64,uint256,uint256)
          handler: handleVrfRequested
        - event: VRFResult(uint64,uint8,uint8)
          handler: handleVRFResult
        - event: RoundResolved(uint64)
          handler: handleRoundResolved
        - event: PayoutProgress(uint64,uint32,uint256,uint256,uint256)
          handler: handlePayoutProgress
        - event: JackpotFunded(uint64,uint32,uint256)
          handler: handleJackpotFunded
        - event: InfrastructureFeePaid(uint64,uint32,uint256)
          handler: handleInfrastructureFeePaid
        - event: MarketRegistered(uint32,address,address)
          handler: handleMarketRegistered
        - event: Initialized(uint64)
          handler: handleGameInitialized
        - event: Upgraded(indexed address)
          handler: handleGameUpgraded
      file: ./src/mappings/roulette.ts
  - name: BRBJackpotFunder
    kind: ethereum/contract
    network: arbitrum-sepolia
    source:
      abi: BRBJackpotFunder
      address: "0x2a36366e71cc52e21607f71b0a9f14216bfb2510"
      startBlock: 273225571
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - JackpotBuy
        - JackpotFundingSkip
        - JackpotFunderConfig
        - Market
      abis:
        - name: BRBJackpotFunder
          file: ./abis/BRBJackpotFunder.json
      eventHandlers:
        - event: FundedFromMarket(uint32,address,uint256,uint256,uint256,uint256)
          handler: handleFundedFromMarket
        - event: FundFromMarketSkipped(indexed uint32,indexed address,uint8)
          handler: handleFundFromMarketSkipped
        - event: SwapAssetBpsUpdated(uint256)
          handler: handleSwapAssetBpsUpdated
        - event: TreasuryBrbSplitUpdated(uint256,uint256)
          handler: handleTreasuryBrbSplitUpdated
        - event: SlippageBpsUpdated(uint256)
          handler: handleSlippageBpsUpdated
      file: ./src/mappings/jackpot-funder.ts
  - name: BRBReferral
    kind: ethereum/contract
    network: arbitrum-sepolia
    source:
      abi: BRBReferral
      address: "0xb6a6a7c9fc32e30fb5af12ad9d6a5cd2a283ad94"
      startBlock: 273225571
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - BRBReferalTransfer
        - User
        - BRBPointsConfig
      abis:
        - name: BRBReferral
          file: ./abis/BRBReferral.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
      file: ./src/mappings/referral.ts
templates:
  - name: BankVault
    kind: ethereum/contract
    network: arbitrum-sepolia
    source:
      abi: MergedEvents
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - GlobalState
        - Market
        - StakedBRBDeposit
        - StakedBRBWithdrawal
        - LargeWithdrawalRequest
        - WithdrawalEjectedLog
        - User
        - TokenApproval
        - AdminRoleChange
        - UpkeepRegistration
        - VaultState
        - ProtocolStats
        - APYSnapshot
        - DailyStat
        - HourlyVolumeSnapshot
      abis:
        - name: StakedBRB
          file: ./abis/BankVault4626.json
        - name: MergedEvents
          file: ./abis/MergedEvents.json
      eventHandlers:
        - event: Deposit(indexed address,indexed address,uint256,uint256)
          handler: handleDeposit
        - event: Withdraw(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleWithdraw
        - event: WithdrawalRequested(address,uint16,address)
          handler: handleWithdrawalRequested
        - event: WithdrawalProcessed(address,uint16,address,uint256,uint256)
          handler: handleWithdrawalProcessed
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
        - event: Approval(indexed address,indexed address,uint256)
          handler: handleApproval
        - event: RoleGranted(indexed bytes32,indexed address,indexed address)
          handler: handleVaultRoleGranted
        - event: RoleRevoked(indexed bytes32,indexed address,indexed address)
          handler: handleVaultRoleRevoked
        - event: RoleAdminChanged(indexed bytes32,indexed bytes32,indexed bytes32)
          handler: handleVaultRoleAdminChanged
        - event: UpkeepRegistered(uint256,uint256,address,uint96)
          handler: handleUpkeepRegistered
      file: ./src/mappings/stakedBRB.ts
