specVersion: 1.3.0
description: BRB multi-market
schema:
  file: ./schema.graphql
indexerHints:
  prune: auto
dataSources:
  - name: BRBToken
    kind: ethereum/contract
    network: arbitrum-sepolia
    source:
      abi: BRB
      address: "0xcd97563e22017462f35ba1e266e13f8f756a53c9"
      startBlock: 284788460
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - GlobalState
        - GlobalRound
        - Market
        - BRBTransfer
        - BRBBurn
        - User
        - UserMarketStats
        - WithdrawTransaction
        - JackpotPayout
        - PayoutTransaction
        - RouletteRound
        - RouletteBet
        - DailyStat
        - TokenApproval
      abis:
        - name: BRB
          file: ./abis/BRB.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
        - event: Approval(indexed address,indexed address,uint256)
          handler: handleApproval
      file: ./src/mappings/brb.ts
  - name: RouletteEngine
    kind: ethereum/contract
    network: arbitrum-sepolia
    source:
      abi: Game
      address: "0x7eb8110d9e84d3c32fa6468d13ea2bc81544acf1"
      startBlock: 284788460
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - GlobalState
        - GlobalRound
        - Market
        - BankAddress
        - RouletteRound
        - RouletteBet
        - PayoutTransaction
        - User
        - UserMarketStats
        - ContractRole
        - RoleHolder
        - ContractUpgrade
        - DailyStat
      abis:
        - name: Game
          file: ./abis/Game.json
        - name: BankVault4626
          file: ./abis/BankVault4626.json
        - name: ERC20
          file: ./abis/ERC20.json
      eventHandlers:
        - event: BetRecorded(uint32,uint64,address,uint256,bytes)
          handler: handleBetRecorded
        - event: RoundCountdownStarted(uint64,uint32,uint256)
          handler: handleRoundCountdownStarted
        - event: VrfRequested(uint64,uint256,uint256)
          handler: handleVrfRequested
        - event: VRFResult(uint64,uint8,uint8)
          handler: handleVRFResult
        - event: RoundResolved(uint64)
          handler: handleRoundResolved
        - event: PayoutProgress(uint64,uint32,uint256,uint256,uint256)
          handler: handlePayoutProgress
        - event: JackpotFunded(uint64,uint32,uint256)
          handler: handleJackpotFunded
        - event: InfrastructureFeePaid(uint64,uint32,uint256)
          handler: handleInfrastructureFeePaid
        - event: MarketRegistered(uint32,address,address)
          handler: handleMarketRegistered
        - event: ReferralSet(address,address)
          handler: handleReferralSet
        - event: WithdrawalQueueBatchSizeUpdated(uint256)
          handler: handleWithdrawalQueueBatchSizeUpdated
        - event: MaxWithdrawalQueueLengthUpdated(uint256)
          handler: handleMaxWithdrawalQueueLengthUpdated
        - event: RoundDurationUpdated(uint32)
          handler: handleRoundDurationUpdated
        - event: JackpotFunderUpdated(address,address)
          handler: handleJackpotFunderUpdated
        - event: JackpotTreasuryUpdated(address,address)
          handler: handleJackpotTreasuryUpdated
        - event: Initialized(uint64)
          handler: handleGameInitialized
        - event: Upgraded(indexed address)
          handler: handleGameUpgraded
        - event: RoleGranted(indexed bytes32,indexed address,indexed address)
          handler: handleRoleGranted
        - event: RoleRevoked(indexed bytes32,indexed address,indexed address)
          handler: handleRoleRevoked
        - event: RoleAdminChanged(indexed bytes32,indexed bytes32,indexed bytes32)
          handler: handleRoleAdminChanged
      file: ./src/mappings/roulette.ts
  - name: BRBJackpotFunder
    kind: ethereum/contract
    network: arbitrum-sepolia
    source:
      abi: BRBJackpotFunder
      address: "0xd990413247611013161a7287d262664df8da7309"
      startBlock: 284788460
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - JackpotBuy
        - JackpotFundingSkip
        - JackpotFunderConfig
        - JackpotFunderIncident
        - Market
      abis:
        - name: BRBJackpotFunder
          file: ./abis/BRBJackpotFunder.json
      eventHandlers:
        - event: FundedFromMarket(uint32,address,uint256,uint256,uint256,uint256)
          handler: handleFundedFromMarket
        - event: FundFromMarketSkipped(uint32,address,uint8)
          handler: handleFundFromMarketSkipped
        - event: JackpotBurnFailed(uint32,uint256)
          handler: handleJackpotBurnFailed
        - event: JackpotTreasuryTransferFailed(uint32,address,uint256)
          handler: handleJackpotTreasuryTransferFailed
        - event: TokenSwept(address,address,uint256)
          handler: handleTokenSwept
        - event: SwapAssetBpsUpdated(uint256)
          handler: handleSwapAssetBpsUpdated
        - event: TreasuryBrbSplitUpdated(uint256,uint256)
          handler: handleTreasuryBrbSplitUpdated
        - event: SlippageBpsUpdated(uint256)
          handler: handleSlippageBpsUpdated
        - event: ColdSlippageBpsUpdated(uint256)
          handler: handleColdSlippageBpsUpdated
        - event: TwapWindowUpdated(uint32)
          handler: handleTwapWindowUpdated
        - event: PairObservationUpdated(address,uint32)
          handler: handlePairObservationUpdated
        - event: RoleGranted(indexed bytes32,indexed address,indexed address)
          handler: handleRoleGranted
        - event: RoleRevoked(indexed bytes32,indexed address,indexed address)
          handler: handleRoleRevoked
        - event: RoleAdminChanged(indexed bytes32,indexed bytes32,indexed bytes32)
          handler: handleRoleAdminChanged
      file: ./src/mappings/jackpot-funder.ts
  - name: BRBReferral
    kind: ethereum/contract
    network: arbitrum-sepolia
    source:
      abi: BRBReferral
      address: "0x5b28b914881e069e72de8183d5b7aec662bf2905"
      startBlock: 284788460
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - BRBReferalTransfer
        - User
        - BRBPointsConfig
      abis:
        - name: BRBReferral
          file: ./abis/BRBReferral.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
      file: ./src/mappings/referral.ts
  - name: SideBet
    kind: ethereum/contract
    network: arbitrum-sepolia
    source:
      abi: SideBet
      address: "0xa0dcb8fced50eed13899af86de70fce42897e8b1"
      startBlock: 284788460
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - SideBet
        - SideBetSettlement
        - SideBetConfig
        - SideBetGlobalConfig
        - Market
        - User
        - UserMarketStats
        - ContractRole
        - RoleHolder
      abis:
        - name: SideBet
          file: ./abis/SideBet.json
      eventHandlers:
        - event: ConfigAdded(uint256,uint32,uint8)
          handler: handleConfigAdded
        - event: ConfigUpdated(uint256)
          handler: handleConfigUpdated
        - event: ConfigStakeLimitsUpdated(uint256,uint256,uint256)
          handler: handleConfigStakeLimitsUpdated
        - event: ConfigRemoved(uint256)
          handler: handleConfigRemoved
        - event: SideBetPlaced(uint256,address,uint256,uint32,uint256,uint256,uint64,uint16)
          handler: handleSideBetPlaced
        - event: SideBetSettled(uint256,address,uint8,uint256)
          handler: handleSideBetSettled
        - event: SideBetJackpotFunded(uint32,uint256)
          handler: handleSideBetJackpotFunded
        - event: SideBetInfrastructureFeePaid(uint32,uint256)
          handler: handleSideBetInfrastructureFeePaid
        - event: MultiplierBandUpdated(uint32,uint32)
          handler: handleMultiplierBandUpdated
        - event: RoleGranted(indexed bytes32,indexed address,indexed address)
          handler: handleRoleGranted
        - event: RoleRevoked(indexed bytes32,indexed address,indexed address)
          handler: handleRoleRevoked
        - event: RoleAdminChanged(indexed bytes32,indexed bytes32,indexed bytes32)
          handler: handleRoleAdminChanged
      file: ./src/mappings/side-bet.ts
templates:
  - name: BankVault
    kind: ethereum/contract
    network: arbitrum-sepolia
    source:
      abi: MergedEvents
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - GlobalState
        - Market
        - VaultDeposit
        - VaultWithdrawal
        - LargeWithdrawalRequest
        - User
        - UserMarketStats
        - TokenApproval
        - ContractRole
        - RoleHolder
        - MarketAPYSnapshot
        - DailyStat
        - HourlyVolumeSnapshot
      abis:
        - name: BankVault4626
          file: ./abis/BankVault4626.json
        - name: MergedEvents
          file: ./abis/MergedEvents.json
      eventHandlers:
        - event: Deposit(indexed address,indexed address,uint256,uint256)
          handler: handleDeposit
        - event: Withdraw(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleWithdraw
        - event: WithdrawalRequested(address,uint16,address)
          handler: handleWithdrawalRequested
        - event: WithdrawalProcessed(address,uint16,address,uint256,uint256)
          handler: handleWithdrawalProcessed
        - event: BetsReleased(uint256,uint256)
          handler: handleBetsReleased
        - event: SideBetStakeLocked(address,uint256,uint256,uint256)
          handler: handleSideBetStakeLocked
        - event: BetPlaced(address,uint256,bytes,uint256)
          handler: handleBetPlaced
        - event: PayoutBatchProcessed(uint256,uint256)
          handler: handlePayoutBatchProcessed
        - event: FundsTransferred(address,uint256)
          handler: handleFundsTransferred
        - event: MinBetUpdated(uint256,uint256)
          handler: handleMinBetUpdated
        - event: SideBetControllerUpdated(address,address)
          handler: handleSideBetControllerUpdated
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
        - event: Approval(indexed address,indexed address,uint256)
          handler: handleApproval
        - event: RoleGranted(indexed bytes32,indexed address,indexed address)
          handler: handleRoleGranted
        - event: RoleRevoked(indexed bytes32,indexed address,indexed address)
          handler: handleRoleRevoked
        - event: RoleAdminChanged(indexed bytes32,indexed bytes32,indexed bytes32)
          handler: handleRoleAdminChanged
      file: ./src/mappings/bank-vault.ts
