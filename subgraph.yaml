specVersion: 1.3.0
description: Talus
schema:
  file: ./schema.graphql
indexerHints:
  prune: auto
dataSources:
  - name: BRBToken
    kind: ethereum/contract
    network: arbitrum-sepolia
    source:
      abi: BRB
      address: "0xd5a0a09f7b7084ac6cefc030ba5c16bacbbefd07"  # Replace with actual BRB token address
      startBlock: 192200860
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - BRBTransfer
        - User
      abis:
        - name: BRB
          file: ./abis/BRB.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
      file: ./src/mappings/brb.ts
  - name: RouletteClean
    kind: ethereum/contract
    network: arbitrum-sepolia
    source:
      abi: Game
      address: "0x8e0bd23da3ad2d4645f78cc6b8b73484868a3a2b"  # Replace with actual RouletteClean address
      startBlock: 192200883
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - GlobalState
        - RouletteRound
        - RouletteBet
        - PayoutTransaction
        - User
      abis:
        - name: Game
          file: ./abis/Game.json
      eventHandlers:
        - event: JackpotResultEvent(uint256,uint256,uint256)
          handler: handleJackpotResultEvent
        - event: RoundStarted(uint256,uint256,uint256)
          handler: handleRoundStarted
        - event: RoundResolved(uint256)
          handler: handleRoundResolved
        - event: VRFResult(uint256,uint256,uint256)
          handler: handleVRFResult
        - event: BatchProcessed(uint256,uint256,uint256)
          handler: handleBatchProcessed
      file: ./src/mappings/roulette.ts
  - name: StakedBRB
    kind: ethereum/contract
    network: arbitrum-sepolia
    source:
      abi: StakedBRB
      address: "0x15dc1be843c63317e87865e1df14afa782fae171"  # Replace with actual StakedBRB address
      startBlock: 192200890
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - GlobalState
        - StakedBRBDeposit
        - StakedBRBWithdrawal
        - LargeWithdrawalRequest
        - ProtocolFee
        - User
        - RouletteRound
        - RouletteBet
      abis:
        - name: StakedBRB
          file: ./abis/StakedBRB.json
      eventHandlers:
        - event: Deposit(indexed address,indexed address,uint256,uint256)
          handler: handleDeposit
        - event: Withdraw(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleWithdraw
        - event: LargeWithdrawalRequested(address,uint256)
          handler: handleLargeWithdrawalRequested
        - event: LargeWithdrawalProcessed(address,uint256)
          handler: handleLargeWithdrawalProcessed
        - event: ProtocolFeeCollected(uint256)
          handler: handleProtocolFeeCollected
        - event: ProtocolFeeRateUpdated(uint256)
          handler: handleProtocolFeeRateUpdated
        - event: RoundTransition(uint256,uint256)
          handler: handleRoundTransition
        - event: BetPlaced(address,uint256,bytes)
          handler: handleBetPlaced
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
        - event: WithdrawalSettingsUpdated(uint256)
          handler: handleWithdrawalSettingsUpdated
        - event: AntiSpamSettingsUpdated(uint256)
          handler: handleAntiSpamSettingsUpdated
      file: ./src/mappings/stakedBRB.ts
  - name: BRBReferal
    kind: ethereum/contract
    network: arbitrum-sepolia
    source:
      abi: BRBReferal
      address: "0x0000000000000000000000000000000000000000"  # Replace with actual BRBReferal address
      startBlock: 192200860  # Update with appropriate start block
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - User
        - BRBReferalTransfer
      abis:
        - name: BRBReferal
          file: ./abis/BRBReferal.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
      file: ./src/mappings/brbReferal.ts
