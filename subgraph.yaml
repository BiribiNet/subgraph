specVersion: 1.3.0
description: BRB
schema:
  file: ./schema.graphql
indexerHints:
  prune: auto
dataSources:
  - name: BRBToken
    kind: ethereum/contract
    network: arbitrum-sepolia
    source:
      abi: BRB
      address: "0x8c6cae5e3a638cc7cded0d1bcb02b76f8bace3f2"  # Replace with actual BRB token address
      startBlock: 253300245
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - GlobalState
        - BRBTransfer
        - User
        - WithdrawTransaction
        - JackpotPayout
        - PayoutTransaction
        - RouletteRound
        - RouletteBet
      abis:
        - name: BRB
          file: ./abis/BRB.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
      file: ./src/mappings/brb.ts
  - name: RouletteClean
    kind: ethereum/contract
    network: arbitrum-sepolia
    source:
      abi: Game
      address: "0x8761cea90cc7ab474d371b039b3bae7bc22d5e96"  # Replace with actual RouletteClean address
      startBlock: 253300280
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - GlobalState
        - RouletteRound
        - RouletteBet
        - PayoutTransaction
        - User
      abis:
        - name: Game
          file: ./abis/Game.json
      eventHandlers:
        - event: ComputedPayouts(uint256,uint256)
          handler: handleComputedPayouts
        - event: MinJackpotConditionUpdated(uint256)
          handler: handleMinJackpotConditionUpdated
        - event: JackpotResultEvent(uint256,uint256)
          handler: handleJackpotResultEvent
        - event: VrfRequested(indexed uint256,uint256,uint256)
          handler: handleVrfRequested
        - event: RoundResolved(uint256)
          handler: handleRoundResolved
        - event: VRFResult(uint256,uint256,uint256)
          handler: handleVRFResult
        - event: BatchProcessed(uint256,uint256,uint256)
          handler: handleBatchProcessed
      file: ./src/mappings/roulette.ts
  - name: StakedBRB
    kind: ethereum/contract
    network: arbitrum-sepolia
    source:
      abi: StakedBRB
      address: "0x306a67e1ca543c0892011174fa02cb1848172965"  # Replace with actual StakedBRB address
      startBlock: 253300275
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - GlobalState
        - StakedBRBDeposit
        - StakedBRBWithdrawal
        - LargeWithdrawalRequest
        - BettingWindowClosedLog
        - QueuedLiquidityRejectedLog
        - WithdrawalEjectedLog
        - User
        - RouletteRound
        - RouletteBet
        - WithdrawTransaction
      abis:
        - name: StakedBRB
          file: ./abis/StakedBRB.json
      eventHandlers:
        - event: RoundCleaningCompleted(uint256,uint256,uint256,(uint256,uint256,uint256))
          handler: handleRoundCleaningCompleted
        - event: Deposit(indexed address,indexed address,uint256,uint256)
          handler: handleDeposit
        - event: Withdraw(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleWithdraw
        - event: WithdrawalRequested(address,uint256)
          handler: handleWithdrawalRequested
        - event: WithdrawalProcessed(address,uint256)
          handler: handleWithdrawalProcessed
        - event: BettingWindowClosed(uint256)
          handler: handleBettingWindowClosed
        - event: LiquidityEscrowSet(address)
          handler: handleLiquidityEscrowSet
        - event: LiquidityOpsPerUpkeepUpdated(uint32)
          handler: handleLiquidityOpsPerUpkeepUpdated
        - event: QueuedLiquidityRejected(address,uint256,uint8)
          handler: handleQueuedLiquidityRejected
        - event: WithdrawalEjected(address,uint8)
          handler: handleWithdrawalEjected
        - event: ProtocolFeeRecipientUpdated(address)
          handler: handleProtocolFeeRecipientUpdated
        - event: ProtocolFeeRateUpdated(uint256)
          handler: handleProtocolFeeRateUpdated
        - event: BurnFeeRateUpdated(uint256)
          handler: handleBurnFeeRateUpdated
        - event: JackpotFeeRateUpdated(uint256)
          handler: handleJackpotFeeRateUpdated
        - event: BetPlaced(address,uint256,bytes,uint256)
          handler: handleBetPlaced
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
        - event: WithdrawalSettingsUpdated(uint256)
          handler: handleWithdrawalSettingsUpdated
        - event: AntiSpamSettingsUpdated(uint256)
          handler: handleAntiSpamSettingsUpdated
      file: ./src/mappings/stakedBRB.ts
  - name: BRBReferal
    kind: ethereum/contract
    network: arbitrum-sepolia
    source:
      abi: BRBReferal
      address: "0xa670a9f1aa3e3d9b489e8d0cc68768556d264a62"  # Replace with actual BRBReferal address
      startBlock: 253300240  # Update with appropriate start block
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - User
        - BRBReferalTransfer
      abis:
        - name: BRBReferal
          file: ./abis/BRBReferal.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
      file: ./src/mappings/brbReferal.ts
