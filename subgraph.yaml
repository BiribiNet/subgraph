specVersion: 1.3.0
description: BRB
schema:
  file: ./schema.graphql
indexerHints:
  prune: auto
dataSources:
  - name: BRBToken
    kind: ethereum/contract
    network: arbitrum-sepolia
    source:
      abi: BRB
      address: "0x2b6897a9e0d78c59a35564d93fd0a2ae745d0654"
      startBlock: 255616597
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - GlobalState
        - BRBTransfer
        - BRBBurn
        - User
        - WithdrawTransaction
        - JackpotPayout
        - PayoutTransaction
        - RouletteRound
        - RouletteBet
        - DailyStats
        - TokenApproval
        - ProtocolStats
      abis:
        - name: BRB
          file: ./abis/BRB.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
        - event: Approval(indexed address,indexed address,uint256)
          handler: handleApproval
      file: ./src/mappings/brb.ts
  - name: RouletteClean
    kind: ethereum/contract
    network: arbitrum-sepolia
    source:
      abi: Game
      address: "0x21dec65fa9d516711004eda8d463c86db90e080d"
      startBlock: 255616638
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - GlobalState
        - RouletteRound
        - RouletteBet
        - PayoutTransaction
        - User
        - AdminRoleChange
        - ContractUpgrade
        - ProtocolStats
        - PayoutFailure
      abis:
        - name: Game
          file: ./abis/Game.json
      eventHandlers:
        - event: ComputedPayouts(uint256,uint256)
          handler: handleComputedPayouts
        - event: MinJackpotConditionUpdated(uint256)
          handler: handleMinJackpotConditionUpdated
        - event: JackpotResultEvent(uint256,uint256)
          handler: handleJackpotResultEvent
        - event: VrfRequested(uint256,uint256,uint256)
          handler: handleVrfRequested
        - event: RoundResolved(uint256)
          handler: handleRoundResolved
        - event: RoundForceResolved(indexed uint256,uint256)
          handler: handleRoundForceResolved
        - event: VRFResult(uint256,uint256,uint256)
          handler: handleVRFResult
        - event: BatchProcessed(uint256,uint256,uint256)
          handler: handleBatchProcessed
        - event: JackpotPayoutFailed(indexed uint256,uint256,bytes)
          handler: handleJackpotPayoutFailed
        - event: PayoutBatchFailed(indexed uint256,uint256,bytes)
          handler: handlePayoutBatchFailed
        - event: RoleGranted(indexed bytes32,indexed address,indexed address)
          handler: handleGameRoleGranted
        - event: RoleRevoked(indexed bytes32,indexed address,indexed address)
          handler: handleGameRoleRevoked
        - event: RoleAdminChanged(indexed bytes32,indexed bytes32,indexed bytes32)
          handler: handleGameRoleAdminChanged
        - event: Initialized(uint64)
          handler: handleGameInitialized
        - event: Upgraded(indexed address)
          handler: handleGameUpgraded
      file: ./src/mappings/roulette.ts
  - name: StakedBRB
    kind: ethereum/contract
    network: arbitrum-sepolia
    source:
      abi: MergedEvents
      address: "0x522f98efd29cd9350f5c96961a418953fdf1039b"
      startBlock: 255616633
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - GlobalState
        - StakedBRBDeposit
        - StakedBRBWithdrawal
        - LargeWithdrawalRequest
        - BettingWindowClosedLog
        - QueuedLiquidityRejectedLog
        - WithdrawalEjectedLog
        - User
        - RouletteRound
        - RouletteBet
        - WithdrawTransaction
        - DailyStats
        - DailyPlayer
        - HourlyVolumeSnapshot
        - HourlyPlayer
        - TokenApproval
        - AdminRoleChange
        - ContractUpgrade
        - UpkeepRegistration
        - MaxBetsUpdate
        - VaultState
        - ProtocolStats
        - APYSnapshot
      abis:
        - name: StakedBRB
          file: ./abis/StakedBRB.json
        - name: MergedEvents
          file: ./abis/MergedEvents.json
      eventHandlers:
        - event: RoundCleaningCompleted(uint256,uint256,uint256,(uint256,uint256,uint256))
          handler: handleRoundCleaningCompleted
        - event: Deposit(indexed address,indexed address,uint256,uint256)
          handler: handleDeposit
        - event: Withdraw(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleWithdraw
        - event: WithdrawalRequested(address,uint256)
          handler: handleWithdrawalRequested
        - event: WithdrawalProcessed(address,uint256)
          handler: handleWithdrawalProcessed
        - event: BettingWindowClosed(uint256)
          handler: handleBettingWindowClosed
        - event: LiquidityEscrowSet(address)
          handler: handleLiquidityEscrowSet
        - event: QueuedLiquidityRejected(address,uint256,uint8)
          handler: handleQueuedLiquidityRejected
        - event: WithdrawalEjected(address,uint8)
          handler: handleWithdrawalEjected
        - event: ProtocolFeeRecipientUpdated(address)
          handler: handleProtocolFeeRecipientUpdated
        - event: ProtocolFeeRateUpdated(uint256)
          handler: handleProtocolFeeRateUpdated
        - event: BurnFeeRateUpdated(uint256)
          handler: handleBurnFeeRateUpdated
        - event: JackpotFeeRateUpdated(uint256)
          handler: handleJackpotFeeRateUpdated
        - event: FirstBetPlaced(uint256,uint256)
          handler: handleFirstBetPlaced
        - event: BetPlaced(address,uint256,bytes,uint256)
          handler: handleBetPlaced
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
        - event: WithdrawalSettingsUpdated(uint256)
          handler: handleWithdrawalSettingsUpdated
        - event: AntiSpamSettingsUpdated(uint256)
          handler: handleAntiSpamSettingsUpdated
        - event: Approval(indexed address,indexed address,uint256)
          handler: handleApproval
        - event: RoleGranted(indexed bytes32,indexed address,indexed address)
          handler: handleVaultRoleGranted
        - event: RoleRevoked(indexed bytes32,indexed address,indexed address)
          handler: handleVaultRoleRevoked
        - event: RoleAdminChanged(indexed bytes32,indexed bytes32,indexed bytes32)
          handler: handleVaultRoleAdminChanged
        - event: Initialized(uint64)
          handler: handleVaultInitialized
        - event: Upgraded(indexed address)
          handler: handleVaultUpgraded
        - event: CleaningUpkeepRegistered(indexed uint256,indexed address,uint32,uint96,string)
          handler: handleCleaningUpkeepRegistered
        - event: UpkeepRegistered(indexed uint256,indexed address,uint32,uint96,uint256,string)
          handler: handleUpkeepRegistered
        - event: MaxSupportedBetsUpdated(uint256,uint256)
          handler: handleMaxSupportedBetsUpdated
      file: ./src/mappings/stakedBRB.ts
  - name: BRBReferal
    kind: ethereum/contract
    network: arbitrum-sepolia
    source:
      abi: BRBReferal
      address: "0x48e85e0f774f0d0d44519b13a959d9faa78e831b"
      startBlock: 255616592
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - User
        - BRBReferalTransfer
        - TokenApproval
      abis:
        - name: BRBReferal
          file: ./abis/BRBReferal.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
        - event: Approval(indexed address,indexed address,uint256)
          handler: handleApproval
      file: ./src/mappings/brbReferal.ts
