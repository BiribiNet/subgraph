specVersion: 1.3.0
description: Talus
schema:
  file: ./schema.graphql
indexerHints:
  prune: auto
dataSources:
  - name: BRBToken
    kind: ethereum/contract
    network: arbitrum-sepolia
    source:
      abi: BRB
      address: "0x59f1b9ec56f3e73687820af17c0d71b134fc43e2"  # Replace with actual BRB token address
      startBlock: 243343812
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - GlobalState
        - BRBTransfer
        - User
        - WithdrawTransaction
        - JackpotPayout
        - PayoutTransaction
        - RouletteRound
        - RouletteBet
      abis:
        - name: BRB
          file: ./abis/BRB.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
      file: ./src/mappings/brb.ts
  - name: RouletteClean
    kind: ethereum/contract
    network: arbitrum-sepolia
    source:
      abi: Game
      address: "0x3c1db00c9b0d4e08d3d666c845a6dd1a0f271a51"  # Replace with actual RouletteClean address
      startBlock: 243343839
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - GlobalState
        - RouletteRound
        - RouletteBet
        - PayoutTransaction
        - User
      abis:
        - name: Game
          file: ./abis/Game.json
      eventHandlers:
        - event: ComputedPayouts(uint256,uint256)
          handler: handleComputedPayouts
        - event: JackpotResultEvent(uint256,uint256)
          handler: handleJackpotResultEvent
        - event: RoundStarted(uint256,uint256,uint256)
          handler: handleRoundStarted
        - event: RoundResolved(uint256)
          handler: handleRoundResolved
        - event: VRFResult(uint256,uint256,uint256)
          handler: handleVRFResult
        - event: BatchProcessed(uint256,uint256,uint256)
          handler: handleBatchProcessed
        - event: ChainlinkSetupCompleted(uint256,address,address)
          handler: handleChainlinkSetupCompleted
      file: ./src/mappings/roulette.ts
  - name: StakedBRB
    kind: ethereum/contract
    network: arbitrum-sepolia
    source:
      abi: StakedBRB
      address: "0x6eae6dd7c11d2b9c748a2d6af2e3b2f0589ec279"  # Replace with actual StakedBRB address
      startBlock: 243343845
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - GlobalState
        - StakedBRBDeposit
        - StakedBRBWithdrawal
        - LargeWithdrawalRequest
        - User
        - RouletteRound
        - RouletteBet
        - WithdrawTransaction
      abis:
        - name: StakedBRB
          file: ./abis/StakedBRB.json
      eventHandlers:
        - event: RoundCleaned(uint256,(uint256,uint256,uint256))
          handler: handleRoundCleaned
        - event: Deposit(indexed address,indexed address,uint256,uint256)
          handler: handleDeposit
        - event: Withdraw(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleWithdraw
        - event: LargeWithdrawalRequested(address,uint256)
          handler: handleLargeWithdrawalRequested
        - event: LargeWithdrawalProcessed(address,uint256)
          handler: handleLargeWithdrawalProcessed
        - event: ProtocolFeeRecipientUpdated(address)
          handler: handleProtocolFeeRecipientUpdated
        - event: ProtocolFeeRateUpdated(uint256)
          handler: handleProtocolFeeRateUpdated
        - event: BurnFeeRateUpdated(uint256)
          handler: handleBurnFeeRateUpdated
        - event: JackpotFeeRateUpdated(uint256)
          handler: handleJackpotFeeRateUpdated
        - event: BetPlaced(address,uint256,bytes,uint256)
          handler: handleBetPlaced
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
        - event: WithdrawalSettingsUpdated(uint256)
          handler: handleWithdrawalSettingsUpdated
        - event: AntiSpamSettingsUpdated(uint256)
          handler: handleAntiSpamSettingsUpdated
      file: ./src/mappings/stakedBRB.ts
  - name: BRBReferal
    kind: ethereum/contract
    network: arbitrum-sepolia
    source:
      abi: BRBReferal
      address: "0x01389be8493b1d516127e54c408d63473b349333"  # Replace with actual BRBReferal address
      startBlock: 243343806  # Update with appropriate start block
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - User
        - BRBReferalTransfer
      abis:
        - name: BRBReferal
          file: ./abis/BRBReferal.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
      file: ./src/mappings/brbReferal.ts
