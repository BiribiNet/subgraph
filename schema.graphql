"Live protocol singleton — round pointer, jackpot pool, withdrawal queue, cross-market vault rollups. Lifetime counters live on ProtocolStats; per-market open wagers on Market.pendingBets."
type GlobalState @entity(immutable: false) {
  "Singleton ID"
  id: Bytes!
  "Current global round entity id"
  currentGlobalRound: GlobalRound!
  "Current global round number"
  currentRoundNumber: BigInt!
  "Last round start time"
  lastRoundStartTime: BigInt!
  "Last round paid"
  lastRoundPaid: BigInt!
  "Current jackpot pool (BRB units)"
  currentJackpot: BigInt!
  "Sum of totalAssets across STABLE-class vaults (raw stable units, e.g. USDC 6-dec)"
  stableVaultTotalAssets: BigInt!
  "Sum of totalAssets across BRB-class vaults (raw 18-dec BRB units)"
  brbVaultTotalAssets: BigInt!
  "Cumulative ERC-4626 deposits into STABLE-class vaults"
  stableVaultTotalDeposits: BigInt!
  "Cumulative ERC-4626 deposits into BRB-class vaults"
  brbVaultTotalDeposits: BigInt!
  "Last round resolved"
  lastRoundResolved: BigInt!
  "Round transition in progress"
  roundTransitionInProgress: Boolean!
  "Large withdrawal batch size"
  largeWithdrawalBatchSize: BigInt!
  "Max queue length"
  maxQueueLength: BigInt!
  "Total pending large withdrawals"
  totalPendingLargeWithdrawals: BigInt!
  "Counter for withdrawal queue position (monotonically increasing)"
  withdrawalQueueCounter: BigInt!
  "Cumulative total BRB transfers TO bank vaults (donations; not ERC-4626 deposits)"
  totalTransfersToPool: BigInt!
}

