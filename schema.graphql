enum RoundStatus {
  BETTING
  NO_MORE_BETS
  VRF
  COMPUTING_PAYOUT
  PAYOUT
  CLEAN
}

enum BetType {
  STRAIGHT
  SPLIT
  STREET
  CORNER
  LINE
  COLUMN
  DOZEN
  RED
  BLACK
  ODD
  EVEN
  LOW
  HIGH
  TRIO_012
  TRIO_023
}

enum PlayerTier { BRONZE, SILVER, GOLD, PLATINUM, DIAMOND, LEGEND }
enum StakingActionType { DEPOSIT, WITHDRAW }

# === Side Bet (Phase 3 — scaffold) ===
# Entities below describe the Side Bet game shape that the eventual on-chain
# contract will emit. No data source / mappings are wired yet; the frontend
# uses mock data until the contract ships. A follow-up PR will add the
# `SideBet` data source + `src/mappings/side-bet.ts` once the contract is
# deployed and the canonical event signatures are published.

enum SideBetType { COLOR_COUNT, NUMBER_HIT, CONSECUTIVE_STREAK, RED_RATIO }
enum SideBetColor { RED, BLACK }
enum SideBetStatus { ACTIVE, WON, LOST, EXPIRED, CANCELLED }

type SideBet @entity(immutable: false) {
  "tx hash + log index of SideBetPlaced"
  id: Bytes!
  "User who placed the side bet"
  player: User!
  "Market the side bet was placed on"
  market: Market!
  "BankVault4626 escrowing the stake (denormalized for query convenience)"
  bank: Bytes!
  "Side bet variant"
  betType: SideBetType!
  "Color for COLOR_COUNT and CONSECUTIVE_STREAK; null otherwise"
  color: SideBetColor
  "Target number for NUMBER_HIT (0-36); null otherwise"
  targetNumber: Int
  "k in '>= k hits' (COLOR_COUNT) or '>= k consecutive' (CONSECUTIVE_STREAK); null otherwise"
  targetCount: Int
  "Threshold ratio in basis points for RED_RATIO (e.g. 6000 = 60%); null otherwise"
  redRatioBps: Int
  "Window length in upcoming spins (1..10)"
  windowSpins: Int!
  "Number of spins observed so far during the window"
  spinsResolved: Int!
  "Payout multiplier locked at placement time, in basis points (10000 = 1x)"
  multiplierBps: Int!
  "Stake amount in asset decimals"
  stake: BigInt!
  "Potential payout if the side bet wins (stake * multiplierBps / 10000)"
  potentialPayout: BigInt!
  "Actual payout received (set when status transitions to WON)"
  actualPayout: BigInt!
  "Lifecycle status"
  status: SideBetStatus!
  "Block timestamp of SideBetPlaced"
  placedAt: BigInt!
  "Block timestamp of the settlement event (WON / LOST / EXPIRED)"
  resolvedAt: BigInt
  "Winning numbers observed during the window (chronological)"
  spinsObserved: [BigInt!]!
  "Settlement events linked to this side bet"
  settlements: [SideBetSettlement!]! @derivedFrom(field: "sideBet")
}

type SideBetSettlement @entity(immutable: true) {
  "tx hash + log index of SideBetSettled / SideBetExpired"
  id: Bytes!
  sideBet: SideBet!
  "Final outcome — WON / LOST / EXPIRED / CANCELLED"
  outcome: SideBetStatus!
  "Payout amount in asset decimals (0 for LOST / EXPIRED)"
  payout: BigInt!
  "Block timestamp of the settlement"
  settledAt: BigInt!
  "Block number"
  blockNumber: BigInt!
  "Transaction hash"
  transactionHash: Bytes!
}

# === Bridge (Phase 4 — scaffold) ===
# Track cross-chain deposits that bridge into a BankVault4626. Two source paths
# are anticipated: EVM (via Across) and Solana (via Mayan Swift). The on-chain
# relayer that calls BankVault4626.deposit after the bridge confirms is TBD;
# this entity will be filled by either (a) a dedicated relayer event or
# (b) a heuristic that joins BankVault4626.Deposit with off-chain bridge data
# via a server-side annotation. No data source / mappings yet.

enum BridgeSourceKind { EVM_ACROSS, SOLANA_MAYAN }

type BridgeDeposit @entity(immutable: true) {
  "Destination tx hash + log index"
  id: Bytes!
  "User receiving the deposit on Arbitrum"
  user: User!
  "Market the deposit landed in"
  market: Market!
  "BankVault4626 proxy address (denormalized)"
  bank: Bytes!
  "Which bridge routed the deposit"
  sourceKind: BridgeSourceKind!
  "Human-readable source chain identifier (e.g. \"solana\", \"ethereum\", \"base\")"
  sourceChain: String!
  "Source token address as a string (SPL mint for Solana, ERC-20 address otherwise)"
  sourceToken: String!
  "Source amount in source-token decimals"
  sourceAmount: BigInt!
  "Post-bridge assets that hit BankVault4626.deposit (in asset decimals)"
  destinationAssets: BigInt!
  "Block timestamp of the destination tx"
  bridgedAt: BigInt!
  "Destination tx hash on Arbitrum"
  destinationTxHash: Bytes!
}

# === BRBJackpotFunder events (Phase 1C bis) ===
# Granular per-swap snapshots: at the end of each profitable round, the funder
# swaps a slice of the market profit (asset) into BRB on Uniswap V2, sends
# `brbToTreasury` to JackpotTreasury, and burns `brbBurned`.

type JackpotBuy @entity(immutable: true) {
  "tx hash + log index"
  id: Bytes!
  market: Market!
  "Asset address (market.asset duplicated for query convenience)"
  asset: Bytes!
  "Amount of `asset` swapped (in asset decimals)"
  assetSwapped: BigInt!
  "Total BRB received from the swap"
  brbOut: BigInt!
  "BRB routed to JackpotTreasury"
  brbToTreasury: BigInt!
  "BRB burned"
  brbBurned: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
  transactionHash: Bytes!
}

# Emitted when a market profit is skipped by the funder (slippage, market paused, etc.).
type JackpotFundingSkip @entity(immutable: true) {
  "tx hash + log index"
  id: Bytes!
  market: Market!
  asset: Bytes!
  "uint8 reason code from FundFromMarketSkipped"
  reason: Int!
  timestamp: BigInt!
}

# Singleton config for the BRBJackpotFunder. Each setter event updates one or more
# fields and bumps `lastUpdatedAt`. Lazy-init: all fields default to 0 until the
# first config event fires.
type JackpotFunderConfig @entity(immutable: false) {
  id: Bytes!                          # constant singleton ("config")
  swapAssetTotalBps: BigInt!
  treasuryBrbNumerator: BigInt!
  treasuryBrbDenominator: BigInt!
  slippageBps: BigInt!
  lastUpdatedAt: BigInt!
}

# Per-market entity. One per (marketId, bank) registered on the RouletteEngine.
# Created by RouletteEngine.MarketRegistered handler (or lazily by the BankVault4626 template
# handler on the first event for a known bank if the engine event hasn't been seen yet).
type Market @entity(immutable: false) {
  "Bytes encoding of marketId (uint32)"
  id: Bytes!
  "uint32 marketId from the engine, stored as BigInt for filtering"
  marketId: BigInt!
  "Underlying ERC-20 asset address (USDC, BRB, ...)"
  asset: Bytes!
  "BankVault4626 proxy address"
  bank: Bytes!
  "ERC-20 symbol of the asset (\"\" if the contract doesn't expose it)"
  assetSymbol: String!
  "ERC-20 decimals of the asset (18 default if the contract doesn't expose it)"
  assetDecimals: Int!
  "ERC-4626 share name (vault.name())"
  shareName: String!
  "ERC-4626 share symbol (vault.symbol())"
  shareSymbol: String!
  "Block timestamp of MarketRegistered (or the first observed event on the bank if lazily created)"
  createdAt: BigInt!
  "Per-market accumulated assets (BankVault4626 totalAssets at last observed event)"
  totalAssets: BigInt!
  "Per-market accumulated shares (BankVault4626 totalSupply at last observed event)"
  totalShares: BigInt!
  "BRB ratio per asset unit set by BRBJackpotFunder.BrbRatioUpdated. 0 until the first ratio update for this market."
  brbRatio: BigInt!
  "Per-market reverse lookup"
  marketRounds: [MarketRound!]! @derivedFrom(field: "market")
  "Bets placed in this market"
  bets: [RouletteBet!]! @derivedFrom(field: "market")
  "Deposits into this market's bank"
  deposits: [StakedBRBDeposit!]! @derivedFrom(field: "market")
  "Withdrawals from this market's bank"
  withdrawals: [StakedBRBWithdrawal!]! @derivedFrom(field: "market")
}

# Per-market projection of a global round.
# id = marketId-globalRoundId
type MarketRound @entity(immutable: false) {
  "Composite key: bytes(marketId) || bytes(globalRoundId)"
  id: Bytes!
  market: Market!
  "BetRecorded.localRound — per-market index"
  localRoundId: BigInt!
  "Cross-market RoundLocked.globalRoundId — matches RouletteRound.id"
  globalRoundId: BigInt!
  "Lifecycle: BETTING | LOCKED | VRF | PAYOUT | CLEAN"
  status: RoundStatus!
  "Sum of BetRecorded.amount in this market+round"
  totalBets: BigInt!
  "Number of BetRecorded events in this market+round"
  betCount: BigInt!
  "Sum of PayoutProgress.paidAmount for this market+round"
  totalPayouts: BigInt!
  "JackpotFunded.amount for this market+round (asset decimals)"
  jackpotFunded: BigInt!
  "InfrastructureFeePaid.amount for this market+round (asset decimals)"
  infraFee: BigInt!
  "Timestamp of first event"
  startedAt: BigInt!
  "Timestamp of RoundLocked"
  lockedAt: BigInt
  "Timestamp of RoundResolved (propagated from the global round)"
  resolvedAt: BigInt
  globalRound: RouletteRound!
}

# O(1) reverse lookup from bank vault address to its Market.
# Populated either eagerly by handleMarketRegistered or lazily by the bank-vault template.
type BankIndex @entity(immutable: false) {
  "Bank vault address"
  id: Bytes!
  market: Market!
}

# Singleton config for the BRBpoints formula. id = bytes("config").
# Default values are seeded at first access by getOrCreateBrbPointsConfig() in
# src/helpers/brb-points.ts. Weights and divisor can be migrated later via a
# config-update handler once an on-chain config contract ships.
type BRBPointsConfig @entity(immutable: false) {
  id: Bytes!
  "Weight applied to totalRouletteBets (BRB wagered). Default: 3."
  wageredWeight: BigInt!
  "Weight applied to totalStaked (BRB staked). Default: 1."
  stakedWeight: BigInt!
  "Weight applied to totalBrbrEarned (BRBR referral credits). Default: 2."
  referralWeight: BigInt!
  "Divisor applied to the weighted sum. Default: 1e18 (so points are denominated in BRB-equivalent units)."
  divisor: BigInt!
  "Block timestamp of the last config update."
  lastUpdatedAt: BigInt!
}

