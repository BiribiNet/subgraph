enum RoundStatus {
  BETTING
  NO_MORE_BETS
  VRF
  PAYOUT
  CLEAN
}

enum BetType {
  STRAIGHT
  SPLIT
  STREET
  CORNER
  LINE
  COLUMN
  DOZEN
  RED
  BLACK
  ODD
  EVEN
  LOW
  HIGH
  TRIO_012
  TRIO_023
}

enum PlayerTier { BRONZE, SILVER, GOLD, PLATINUM, DIAMOND, LEGEND }

"Underlying asset class for vault TVL/APY aggregation (never mix raw units across classes)"
enum VaultAssetClass {
  STABLE
  BRB
}

"Per-asset market (bank vault + engine marketId)"
type Market @entity(immutable: false) {
  "marketId as decimal string (1, 2, 3, …)"
  id: ID!
  "On-chain market id (uint32)"
  marketId: Int!
  "Underlying ERC-20 asset"
  asset: Bytes!
  "BankVault4626 proxy address"
  bank: Bytes!
  "RouletteEngine address"
  engine: Bytes!
  "ERC-20 asset symbol (e.g. USDC) — read on-chain at registration"
  assetSymbol: String!
  "ERC-20 asset decimals — read on-chain at registration"
  assetDecimals: Int!
  "STABLE = USD-pegged vaults (USDC, etc.); BRB = native BRB vault"
  assetClass: VaultAssetClass!
  "BankVault4626 share token name — read on-chain at registration"
  shareName: String!
  "BankVault4626 share token symbol — read on-chain at registration"
  shareSymbol: String!
  "Raw underlying token balance held by the bank (event-sourced ledger)"
  grossVaultBalance: BigInt!
  "Bet + side-bet liquidity locked in the vault (mirrors on-chain lockedBetLiquidity)"
  lockedBetLiquidity: BigInt!
  "ERC-4626 totalAssets = grossVaultBalance - lockedBetLiquidity (no eth_call)"
  totalAssets: BigInt!
  "ERC-4626 total shares"
  totalShares: BigInt!
  "Asset per share (totalAssets / totalShares)"
  sharePrice: BigDecimal!
  "Distinct depositors with shares > 0 (this vault only)"
  stakerCount: BigInt!
  "APY — 7 day rolling window (this vault, same asset units)"
  apy7Day: BigDecimal!
  "APY — 30 day rolling window"
  apy30Day: BigDecimal!
  "APY — 365 day rolling window"
  apy365Day: BigDecimal!
  "APY — lifetime since first deposit in this vault"
  apyLifetime: BigDecimal!
  "Lifetime APY baseline timestamp (first deposit in this vault)"
  apyLifetimeBaselineTimestamp: BigInt!
  "Lifetime APY baseline total assets"
  apyLifetimeBaselineTotalAssets: BigInt!
  "Lifetime APY baseline total shares"
  apyLifetimeBaselineTotalShares: BigInt!
  "Last APY snapshot timestamp for this vault"
  lastApySnapshotTimestamp: BigInt!
  "Cumulative deposit volume (assets)"
  totalDepositVolume: BigInt!
  "Cumulative withdraw volume (assets)"
  totalWithdrawVolume: BigInt!
  "BRB sent directly to the bank before deposit unwrap (analytics; gross also updated)"
  brbDonations: BigInt!
  "Cumulative SideBet jackpot fee routed to funder (market asset units)"
  sideBetJackpotFees: BigInt!
  "Cumulative SideBet infrastructure fees (market asset units)"
  sideBetInfraFees: BigInt!
  "Wagered in open global rounds (this market's asset)"
  pendingBets: BigInt!
  "Side-bet payout reserve locked in the vault (from SideBetStakeLocked)"
  lockedSideBetLiquidity: BigInt!
  "Max payout liability buffer for the active open round (mirrors RouletteRound.maxBetAmount)"
  maxBetAmount: BigInt!
  "Registry-registered and engine-linked"
  active: Boolean!
  "First MarketRegistered (engine) timestamp"
  createdAt: BigInt!
  "First MarketRegistered block"
  createdAtBlock: BigInt!
  "Per-market rounds in global rounds"
  marketRounds: [RouletteRound!]! @derivedFrom(field: "market")
  "Vault deposits"
  deposits: [VaultDeposit!]! @derivedFrom(field: "market")
  "Vault withdrawals"
  withdrawals: [VaultWithdrawal!]! @derivedFrom(field: "market")
  "Daily APY snapshots for this vault"
  apySnapshots: [MarketAPYSnapshot!]! @derivedFrom(field: "market")
  "Per-player stats in this market"
  playerStats: [UserMarketStats!]! @derivedFrom(field: "market")
  "Roulette bets in this market"
  bets: [RouletteBet!]! @derivedFrom(field: "market")
  "Side bets in this market"
  sideBets: [SideBet!]! @derivedFrom(field: "market")
  "Jackpot funder swaps from this market"
  jackpotBuys: [JackpotBuy!]! @derivedFrom(field: "market")
}

"Lookup: bank proxy address → Market (for vault event handlers)"
type BankAddress @entity(immutable: false) {
  id: Bytes!
  market: Market!
}

"Shared roulette round across all markets (VRF, winning numbers)"
type GlobalRound @entity(immutable: false) {
  "globalRoundId"
  id: Bytes!
  "Same as id (global round counter)"
  roundNumber: BigInt!
  "Lifecycle across all markets"
  status: RoundStatus!
  "Market whose first bet started the betting window"
  triggerMarket: Market
  "Winning number (0-36)"
  winningNumber: BigInt
  "Jackpot number (0-36)"
  jackpotNumber: BigInt
  "VRF request id"
  requestId: BigInt
  "VRF request tx"
  vrfTxHash: Bytes
  "First bet timestamp (any market); 0 = none yet"
  firstBetAt: BigInt!
  "Round start"
  startedAt: BigInt!
  "Unix timestamp when betting closes (RoundCountdownStarted.lockAt); 0 = not scheduled"
  lockAt: BigInt!
  "True when VRF winning number equals jackpot number"
  jackpotTriggered: Boolean
  "Betting closed"
  endedAt: BigInt
  "VRF fulfilled"
  vrfResultAt: BigInt
  "RoundResolved"
  resolvedAt: BigInt
  "Admin force-resolve"
  forceResolved: Boolean!
  "Markets with bets this round"
  participantMarketCount: BigInt!
  "Per-market slices"
  marketRounds: [RouletteRound!]! @derivedFrom(field: "globalRound")
}

type User @entity(immutable: false) {
  "User address"
  id: Bytes!
  "BRB Token Balance"
  brbBalance: BigInt!
  "Aggregate vault share balance across markets (share units; not normalized across assets — prefer UserMarketStats.sbrbShares per market)"
  sbrbBalance: BigInt!
  "BRBReferal Token Balance"
  brbReferalBalance: BigInt!
  "Cumulative assets deposited across all vaults (mixed units in Phase 1 — prefer UserMarketStats.totalStaked per market)"
  totalStaked: BigInt!
  "Cumulative assets withdrawn across all vaults (mixed units in Phase 1 — prefer UserMarketStats.totalUnstaked per market)"
  totalUnstaked: BigInt!
  "Cumulative deposit value (sum of all BRB deposited)"
  cumulativeDepositValue: BigInt!
  "Cumulative shares received from deposits"
  cumulativeDepositShares: BigInt!
  "Total BRB bet in roulette (18-decimal normalized across markets)"
  totalRouletteBets: BigInt!
  "Array of Roulette bets"
  rouletteBets: [RouletteBet]! @derivedFrom(field: "user")
  "Vault deposits across all markets"
  vaultDeposits: [VaultDeposit]! @derivedFrom(field: "user")
  "Vault withdrawals across all markets"
  vaultWithdrawals: [VaultWithdrawal]! @derivedFrom(field: "user")
  "Array of large withdrawal requests"
  largeWithdrawalRequests: [LargeWithdrawalRequest]! @derivedFrom(field: "user")
  "If set, id of the user's open queued withdrawal request (FIFO queue; one pending per user on-chain)"
  openWithdrawalRequestId: Bytes
  "Array of payout transactions"
  payoutTransactions: [PayoutTransaction]! @derivedFrom(field: "user")
  "Array of BRBReferal transfers"
  brbReferalTransfers: [BRBReferalTransfer]! @derivedFrom(field: "user")
  "Bound referrer (RouletteEngine.ReferralSet); null until first bind"
  referrer: User
  "ReferralSet block timestamp"
  referralSetAt: BigInt
  "Players referred by this wallet"
  referees: [User!]! @derivedFrom(field: "referrer")
  "Per-market wagering, wins, and staking totals"
  marketStats: [UserMarketStats!]! @derivedFrom(field: "user")
  "Side bets placed by this wallet"
  sideBets: [SideBet!]! @derivedFrom(field: "player")
  "Jackpot wins received"
  jackpotPayouts: [JackpotPayout!]! @derivedFrom(field: "user")
  "Daily BRBP point snapshots"
  dailyPoints: [UserDailyPoints!]! @derivedFrom(field: "user")
  "Player tier"
  tier: PlayerTier!
  "BRBP points"
  brbpPoints: BigInt!
  "First seen timestamp"
  firstSeenAt: BigInt!
  "Last active timestamp"
  lastActiveAt: BigInt!
  "Total BRB won"
  totalWon: BigInt!
  "Total BRB lost (derived: totalRouletteBets - totalWon, always consistent)"
  totalLost: BigInt!
  "Number of winning bets"
  winCount: BigInt!
  "Number of distinct rounds this user bet on (not individual bets)"
  betCount: BigInt!
  "Total BRBR earned from referral credits"
  totalBrbrEarned: BigInt!
  "Total BRBR spent (debits)"
  totalBrbrSpent: BigInt!
}

"Per-user stats in a single market (amounts in that market's asset units)"
type UserMarketStats @entity(immutable: false) {
  "{userHex}-{marketId}"
  id: ID!
  user: User!
  market: Market!
  "Total wagered on roulette in this market"
  totalWagered: BigInt!
  "Total won (payouts + jackpots) in this market"
  totalWon: BigInt!
  "totalWagered - totalWon"
  totalLost: BigInt!
  "Distinct global rounds bet on in this market"
  betCount: BigInt!
  "Winning round count in this market"
  winCount: BigInt!
  "Cumulative assets deposited into this vault"
  totalStaked: BigInt!
  "Cumulative assets withdrawn from this vault"
  totalUnstaked: BigInt!
  "Current vault share balance (sBRB) in this market"
  sbrbShares: BigInt!
  "Cumulative side-bet stake in this market"
  sideBetStake: BigInt!
  "Cumulative side-bet payouts in this market"
  sideBetWon: BigInt!
  firstSeenAt: BigInt!
  lastActiveAt: BigInt!
}

