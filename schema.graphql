enum RoundStatus {
  BETTING
  VRF
  COMPUTING_PAYOUT
  PAYOUT
  CLEAN
}

enum BetType {
  STRAIGHT
  SPLIT
  STREET
  CORNER
  LINE
  COLUMN
  DOZEN
  RED
  BLACK
  ODD
  EVEN
  LOW
  HIGH
  TRIO_012
  TRIO_023
  VOISINS
  TIERS
  ORPHELINS
  JEU_ZERO
}

enum PlayerTier { BRONZE, SILVER, GOLD, PLATINUM, DIAMOND, LEGEND }
enum StakingActionType { DEPOSIT, WITHDRAW }

type User @entity(immutable: false) {
  "User address"
  id: Bytes!
  "BRB Token Balance"
  brbBalance: BigInt!
  "sBRB (StakedBRB) Token Balance"
  sbrbBalance: BigInt!
  "BRBReferal Token Balance"
  brbReferalBalance: BigInt!
  "Total BRB staked"
  totalStaked: BigInt!
  "Total BRB unstaked"
  totalUnstaked: BigInt!
  "Cumulative deposit value (sum of all BRB deposited)"
  cumulativeDepositValue: BigInt!
  "Cumulative shares received from deposits"
  cumulativeDepositShares: BigInt!
  "Total BRB bet in roulette"
  totalRouletteBets: BigInt!
  "Total BRB won in roulette"
  totalRouletteWins: BigInt!
  "Net profit (totalRouletteWins - totalRouletteBets, can be negative)"
  netProfit: BigInt!
  "Array of Roulette bets"
  rouletteBets: [RouletteBet]! @derivedFrom(field: "user")
  "Array of StakedBRB deposits"
  stakedBRBDeposits: [StakedBRBDeposit]! @derivedFrom(field: "user")
  "Array of StakedBRB withdrawals"
  stakedBRBWithdrawals: [StakedBRBWithdrawal]! @derivedFrom(field: "user")
  "Array of large withdrawal requests"
  largeWithdrawalRequests: [LargeWithdrawalRequest]! @derivedFrom(field: "user")
  "If set, id of the user's open queued withdrawal request (FIFO queue; one pending per user on-chain)"
  openWithdrawalRequestId: Bytes
  "Array of payout transactions"
  payoutTransactions: [PayoutTransaction]! @derivedFrom(field: "user")
  "Array of BRBReferal transfers"
  brbReferalTransfers: [BRBReferalTransfer]! @derivedFrom(field: "user")
  "Player tier"
  tier: PlayerTier!
  "BRBP points"
  brbpPoints: BigInt!
  "First seen timestamp"
  firstSeenAt: BigInt!
  "Last active timestamp"
  lastActiveAt: BigInt!
  "Total BRB won"
  totalWon: BigInt!
  "Total BRB lost"
  totalLost: BigInt!
  "Number of winning bets"
  winCount: BigInt!
}

