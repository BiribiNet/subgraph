  "Array of BRBReferal transfers"
  brbReferalTransfers: [BRBReferalTransfer]! @derivedFrom(field: "user")
  "Player tier"
  tier: PlayerTier!
  "BRBP points"
  brbpPoints: BigInt!
  "First seen timestamp"
  firstSeenAt: BigInt!
  "Last active timestamp"
  lastActiveAt: BigInt!
  "Total BRB won"
  totalWon: BigInt!
  "Total BRB lost (derived: totalRouletteBets - totalWon, always consistent)"
  totalLost: BigInt!
  "Number of winning bets"
  winCount: BigInt!
  "Number of distinct rounds this user bet on (not individual bets)"
  betCount: BigInt!
  "Total BRBR earned from referral credits"
  totalBrbrEarned: BigInt!
  "Total BRBR spent (debits)"
  totalBrbrSpent: BigInt!
}

