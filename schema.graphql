  "Block number"
  blockNumber: BigInt!
  "Block timestamp"
  timestamp: BigInt!
  "Transaction hash"
  transactionHash: Bytes!
}

"Chainlink upkeep registration"
type UpkeepRegistration @entity(immutable: true) {
  id: Bytes!
  "Registration type: CLEANING or STANDARD"
  registrationType: String!
  "Chainlink upkeep ID"
  upkeepId: BigInt!
  "Forwarder address"
  forwarder: Bytes!
  "Gas limit"
  gasLimit: BigInt!
  "LINK amount funded"
  linkAmount: BigInt!
  "Check data length (STANDARD only)"
  checkDataLength: BigInt
  "Upkeep type"
  upkeepType: String!
  "Block number"
  blockNumber: BigInt!
  "Block timestamp"
  timestamp: BigInt!
  "Transaction hash"
  transactionHash: Bytes!
}

"Singleton lifetime analytics (dashboards, leaderboards). Query id: \"stats\". Operational state is GlobalState."
type ProtocolStats @entity(immutable: false) {
  "Singleton: stats"
  id: ID!
  "Total BRB wagered all time"
  totalWagered: BigInt!
  "Total bets placed all time"
  totalBets: BigInt!
  "Total rounds completed"
  totalRounds: BigInt!
  "Total unique players"
