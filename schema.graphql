type RouletteRound @entity(immutable: false) {
  "Composite id: globalRoundId || marketId"
  id: Bytes!
  "Parent global round"
  globalRound: GlobalRound!
  "Market this exposure belongs to"
  market: Market!
  "Global round number (denormalized)"
  roundNumber: BigInt!
  "Per-market status (mirrors global phase; payout/settle may lag)"
  status: RoundStatus!
  "First bet in this market for this global round (0 = none yet)"
  firstBetAt: BigInt!
  "Total individual bet placements in this round (sum across all users)"
  betCount: BigInt!
  "Total BRB wagered in round"
  totalBets: BigInt!
  "Max payout buffer for the round (RouletteClean maxPayout * safety buffer)"
  maxBetAmount: BigInt!
  "Max total straight bet amount on any number for the round"
  maxStraightBet: BigInt!
  "Max total street bet amount on any street for the round"
  maxStreetBet: BigInt!
  "Total straight bet amount per number index (0..36)"
  straightBetsTotals: [BigInt!]!
  "Total street bet amount per street-start index (0..36)"
  streetBetsTotals: [BigInt!]!
  "Total red bet amount for the round"
  redBetsSum: BigInt!
  "Total black bet amount for the round"
  blackBetsSum: BigInt!
  "Total odd bet amount for the round"
  oddBetsSum: BigInt!
  "Total even bet amount for the round"
  evenBetsSum: BigInt!
  "Total low bet amount for the round"
  lowBetsSum: BigInt!
  "Total high bet amount for the round"
  highBetsSum: BigInt!
  "Total dozen bet amount sums by dozen id (index 0..3; use 1..3)"
  dozenBetsSum: [BigInt!]!
  "Total column bet amount sums by column id (index 0..3; use 1..3)"
  columnBetsSum: [BigInt!]!
  "Max payout liability from split/corner/line/trio bets: SPLIT*18 + CORNER*9 + LINE*6 + TRIO*12"
  otherBetsPayout: BigInt!
  "Number of payouts processed so far (from PayoutProgress.toCursor)"
  currentPayoutsCount: BigInt!
  "Total paid out to winners in this round (from PayoutProgress)"
  totalPayouts: BigInt!
  "First bet / round start for this market"
  startedAt: BigInt!
  "Jackpot revenue share (2.5%)"
  jackpotRevenue: BigInt!
  "Infrastructure revenue share (2%)"
  infraRevenue: BigInt!
  "Array of bets in this round"
  bets: [RouletteBet]! @derivedFrom(field: "round")
  "Array of payout transactions in this round"
  payoutTransactions: [PayoutTransaction]! @derivedFrom(field: "round")
  "Array of jackpot payouts in this round"
  jackpotPayouts: [JackpotPayout]! @derivedFrom(field: "round")
}

type RouletteBet @entity(immutable: false) {
  "User address + marketRound id"
  id: Bytes!
  "User who placed the bet"
  user: User!
  "Market (denormalized)"
  market: Market!
  "Per-market round slice"
  round: RouletteRound!
  "Array of bet amounts"
  amounts: [BigInt!]!
  "Array of bet types"
  betTypes: [BetType!]!
  "Array of bet numbers/identifiers"
  numbers: [BigInt!]!
  "Total bet amount for this user in this round"
  totalAmount: BigInt!
  "Number of individual bets placed by this user in this round (e.g. 3 for a straight+red+dozen combo)"
  betCount: BigInt!
  "Actual payout received"
  actualPayout: BigInt!
  "Whether the bet won"
  won: Boolean!
  "First bet block number"
  firstBetBlockNumber: BigInt!
  "Latest bet block number"
  latestBetBlockNumber: BigInt!
  "First bet timestamp"
  firstBetTimestamp: BigInt!
  "Latest bet timestamp"
  latestBetTimestamp: BigInt!
  "Latest transaction hash"
  latestTransactionHash: Bytes!
  "Array of payout transactions for this bet"
  payoutTransactions: [PayoutTransaction]! @derivedFrom(field: "bet")
  "Array of jackpot payouts for this bet"
  jackpotPayouts: [JackpotPayout]! @derivedFrom(field: "bet")
}

