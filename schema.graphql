  "Total BRB unstaked"
  totalUnstaked: BigInt!
  "Cumulative deposit value (sum of all BRB deposited)"
  cumulativeDepositValue: BigInt!
  "Cumulative shares received from deposits"
  cumulativeDepositShares: BigInt!
  "Total BRB bet in roulette"
  totalRouletteBets: BigInt!
  "Total BRB won in roulette"
  totalRouletteWins: BigInt!
  "Net profit (totalRouletteWins - totalRouletteBets, can be negative)"
