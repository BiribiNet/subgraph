# === Side Bet (Phase 3) ===
# Enum order MUST match ISideBet.SideBetType / SideBetColor / SideBetStatus in contracts.

enum SideBetType {
  COLOR_COUNT
  NUMBER_HIT
  CONSECUTIVE_STREAK
  RED_RATIO
  LIGHTNING_DOUBLE
  PERFECT_ALTERNATION
  DOZEN_HIT
  COLUMN_HIT
  JACKPOT_IN_WINDOW
}
enum SideBetColor { RED, BLACK }
enum SideBetStatus { ACTIVE, WON, LOST, EXPIRED, CANCELLED }

type SideBet @entity(immutable: false) {
  id: Bytes!
  configId: BigInt!
  player: User!
  market: Market!
  bank: Bytes!
  betType: SideBetType!
  color: SideBetColor
  targetNumber: Int
  targetCount: Int
  redRatioBps: Int
  startGlobalRound: BigInt!
  windowSpins: Int!
  spinsResolved: Int!
  multiplierBps: Int!
  stake: BigInt!
  potentialPayout: BigInt!
  actualPayout: BigInt!
  status: SideBetStatus!
  placedAt: BigInt!
  resolvedAt: BigInt
  "Winning numbers observed during the bet window (from VRFResult indexing)"
  spinsObserved: [BigInt!]!
  settlements: [SideBetSettlement!]! @derivedFrom(field: "sideBet")
}

type SideBetConfig @entity(immutable: false) {
  id: ID!
  market: Market!
  betType: SideBetType!
  color: SideBetColor
  targetNumber: Int
  targetCount: Int
  redRatioBps: Int
  windowSpins: Int!
  multiplierBps: Int!
  minStake: BigInt!
  maxStake: BigInt!
  active: Boolean!
  createdAt: BigInt!
  lastUpdatedAt: BigInt!
}

type SideBetSettlement @entity(immutable: true) {
  id: Bytes!
  sideBet: SideBet!
  outcome: SideBetStatus!
  payout: BigInt!
  settledAt: BigInt!
  blockNumber: BigInt!
  transactionHash: Bytes!
}

# === BRBJackpotFunder events (Phase 1C bis) ===
# Per-swap snapshots: at the end of each profitable round, the funder swaps a
# slice of the market profit (asset) into BRB on Uniswap V2, sends
# `brbToTreasury` to JackpotTreasury, and burns `brbBurned`.

type JackpotBuy @entity(immutable: true) {
  id: Bytes!
  market: Market!
  asset: Bytes!
  assetSwapped: BigInt!
  brbOut: BigInt!
  brbToTreasury: BigInt!
  brbBurned: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
  transactionHash: Bytes!
}

type JackpotFundingSkip @entity(immutable: true) {
  id: Bytes!
  market: Market!
  asset: Bytes!
  reason: Int!
  timestamp: BigInt!
}

# Singleton config for the BRBJackpotFunder. Each setter event updates one or
# more fields and bumps `lastUpdatedAt`. Lazy-init: all fields default to 0
# until the first config event fires.
type JackpotFunderConfig @entity(immutable: false) {
  id: Bytes!
  swapAssetTotalBps: BigInt!
  treasuryBrbNumerator: BigInt!
  treasuryBrbDenominator: BigInt!
  slippageBps: BigInt!
  lastUpdatedAt: BigInt!
}

# === BRBpoints (Phase 2A) ===
# Singleton config for the BRBpoints scoring formula. Defaults seeded at first
# access in src/helpers/brb-points.ts. See User.brbpPoints + User.tier.
type BRBPointsConfig @entity(immutable: false) {
  id: Bytes!
  wageredWeight: BigInt!
  stakedWeight: BigInt!
  referralWeight: BigInt!
  divisor: BigInt!
  lastUpdatedAt: BigInt!
}

# Daily snapshot of a user's cumulative BRBpoints. id = userAddress + day bytes
# (day = timestamp / 86400). Written by recomputeAndSaveUserPoints on every points
# change, keeping the latest value for the day. Enables time-windowed views
# (e.g. points gained over the last 7/30 days) by diffing buckets — all derived
# from the subgraph, no backend.
type UserDailyPoints @entity(immutable: false) {
  id: Bytes!
  "Owner of the snapshot"
  user: User!
  "Unix day (timestamp / 86400)"
  day: Int!
  "Cumulative brbpPoints at the end of this day"
  pointsAtEndOfDay: BigInt!
  "Tier at the end of this day"
  tier: PlayerTier!
  "Timestamp of the last update within this day"
  updatedAt: BigInt!
}

"Per-tx flags to exclude bets/deposits from donation accounting"
type TxActivity @entity(immutable: false) {
  id: Bytes!
  betToBank: BigInt!
  depositToBank: BigInt!
  "Market id for the bet in this tx (0 if none)"
  betMarketId: Int!
}

"Side bets awaiting a VRF spin on a given global round"
type SideBetRoundPending @entity(immutable: false) {
  id: Bytes!
  sideBetIds: [Bytes!]!
}

